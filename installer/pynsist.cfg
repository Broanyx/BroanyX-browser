# BroanyX Browser — pynsist config
# ==================================
# pynsist builds a Windows installer specifically for Python apps.
# Install it: pip install pynsist
# Build:      pynsist installer\pynsist.cfg
#
# It downloads Python + pip packages automatically and bundles everything.

[Application]
name=BroanyX Browser
version=1.0.0
entry_point=main:main
icon=assets/icon.ico
publisher=BroanyX
license_file=

[Python]
version=3.11.9
bitness=64
; pynsist bundles its own Python — users don't need Python installed

[Include]
; Python packages to bundle
packages=PyQt6
         PyQt6-WebEngine
         stem
         requests
         socks
         adblockparser
         certifi
         charset_normalizer
         urllib3
         idna

; Extra files to include
files=assets/
      version.json

[Build]
directory=dist/pynsist_installer
installer_name=BroanyX-Setup-pynsist.exe
